<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação Cancelada - YT Downloader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cancel.css">
</head>
<body oncontextmenu="return false;">

    <div class="wrapper" style="padding-top: 40px;">
        <main>
            <div class="card card-cancel">
                <div class="glow-effect glow-cancel"></div>
                
                <div class="cancel-icon">
                    <svg fill="none" stroke="#050508" viewBox="0 0 24 24" style="width: 28px; height: 28px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>

                <h1 class="cancel-title">CANCELADO</h1>
                <p class="cancel-text">Nenhuma cobrança foi gerada.</p>

                <button onclick="window.location.href='/';" class="btn btn-cancel">
                    VOLTAR AO INÍCIO
                </button>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 YT Downloader.</p>
    </footer>

    <script>
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) { e.preventDefault(); return false; }
        });
    </script>
</body>
</html>
