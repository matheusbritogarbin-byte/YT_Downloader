<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação Cancelada - YT Downloader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cancel.css">
</head>
<body oncontextmenu="return false;">

    <div class="wrapper">
        <div class="navbar"></div>

        <main>
            <div class="card" style="border-color: #f59e0b; box-shadow: 0 0 40px rgba(245, 158, 11, 0.15);">
                <div class="glow-effect" style="background: linear-gradient(135deg, #f59e0b, #78350f); opacity: 0.3;"></div>
                
                <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);">
                    <svg fill="none" stroke="#050508" viewBox="0 0 24 24" style="width: 26px; height: 26px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                </div>

                <h1 style="text-shadow: 0 0 15px rgba(245, 158, 11, 0.2);">CHECKOUT <span>CANCELADO</span></h1>
                <p style="color: #4b5563;">O processo de pagamento foi interrompido e nenhuma cobrança foi gerada.</p>

                <div class="price-tag" style="border-color: rgba(245, 158, 11, 0.2); margin-bottom: 32px;">
                    <div>
                        <span style="font-size: 10px; color: #f59e0b; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px;">ESTADO</span>
                        <div style="font-size: 15px; font-weight: 800; color: #ffffff;">Nenhum valor descontado</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 20px; font-weight: 900; color: #f59e0b;">PENDENTE</div>
                    </div>
                </div>

                <button onclick="window.location.href='index.html';" class="btn" style="background: linear-gradient(135deg, #374151 0%, #1f2937 100%); box-shadow: 0 0 20px rgba(31, 41, 55, 0.3); font-weight: 800; color: #9ca3af;">
                    VOLTAR AO INÍCIO
                </button>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 YT Downloader.</p>
    </footer>

    <script>
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) { e.preventDefault(); return false; }
        });
    </script>
</body>
</html>
