<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - FREE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div class="wrapper">
        <div class="navbar">
            <button id="upgradeBtn" onclick="openPremiumModal()" class="btn btn-premium animate-pulse">
                Upgrade Premium
            </button>
        </div>

        <main>
            <div class="card">
                <div class="glow-effect"></div>
                <h1 id="mainTitle">YT <span>Downloader</span></h1>
                <p id="mainDesc">Download gratuito de áudio mp3 na qualidade padrão do servidor.</p>

                <form id="downloadForm" class="input-group">
                    <textarea 
                        id="videoUrl"
                        placeholder="Cole o link do YouTube aqui..." 
                        required
                        rows="1"
                        style="width: 100%; padding: 18px 20px; background-color: #050508; border: 2px solid #1f2937; border-radius: 16px; color: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: 600; outline: none; resize: none; box-sizing: border-box; transition: all 0.2s ease;"
                    ></textarea>
                    
                    <div id="qualitySelectionContainer" style="background-color: #050508; border: 2px solid #1f2937; border-radius: 16px; padding: 16px; text-align: left; font-family: sans-serif; font-size: 13px; display: none;">
                        <span style="color: #10b981; font-weight: 900; display: block; margin-bottom: 12px; font-size: 11px; letter-spacing: 1px;">SELECIONE A QUALIDADE PREMIUM</span>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_1080p" checked style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - FULL HD 1080p</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_720p" style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - HD 720p</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp3_320k" style="margin-right: 8px; accent-color: #10b981;"> MP3 Áudio - ULTRA HQ 320kbps</label>
                        </div>
                    </div>
                    
                    <button type="submit">
                        DOWNLOAD
                    </button>
                </form>

                <div id="statusAlert" class="status-alert hidden"></div>
                <div id="resultsContainer" style="margin-top: 28px; display: flex; flex-direction: column; gap: 20px;"></div>

                <div id="footerQuota" class="footer-info">
                    <div>COTA GRATUITA: <span id="cotaContador" style="color: #ef4444; font-weight: 900;">2/2</span></div>
                    <div>PLANO PREMIUM: <strong style="color: #f59e0b; font-weight: 900;">R$ 4,99</strong></div>
                </div>
            </div>
        </main>
    </div>

    <div id="premiumModal" class="modal-backdrop">
        <div class="modal">
            <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);">
                <svg fill="none" stroke="#ffffff" viewBox="0 0 24 24" style="width: 26px; height: 26px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                </svg>
            </div>
            
            <h2 id="modalTitle" style="font-size: 24px; font-weight: 900; margin: 0 0 8px 0; color: #ffffff; letter-spacing: 0.5px;">SEJA PREMIUM!</h2>
            <p id="modalDescription" style="margin-bottom: 24px; color: #94a3b8; font-size: 13px;">Faça o upgrade para baixar vídeos ilimitados em 1080p e em lote.</p>
            
            <div class="price-tag">
                <div>
                    <span style="font-size: 10px; color: #ef4444; font-weight: 900; text-transform: uppercase;">ACESSO TOTAL</span>
                    <div style="font-size: 15px; font-weight: 800; color: #ffffff;">Plano Premium</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 24px; font-weight: 900; color: #ef4444;">R$ 4,99</div>
                    <span style="font-size: 10px; color: #64748b;">mensal</span>
                </div>
            </div>

            <div class="input-group">
                <button id="buyPremiumBtn" class="btn" style="background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);">
                    DESBLOQUEAR AGORA
                </button>
                <button onclick="closePremiumModal()" style="background: #1e293b; color: #94a3b8; width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">
                    VOLTAR AO PAINEL
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 YT Downloader.</p>
    </footer>

    <script>
        const MAX_DOWNLOADS = 2;
        const API_BASE_URL = "https://backend-production-5a6c0.up.railway.app/";

        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) { e.preventDefault(); return false; }
        });

        function getUrlToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('premium_token', urlToken);
                return urlToken;
            }
            return localStorage.getItem('premium_token');
        }

        function getStorageData() {
            const today = new Date().toISOString().split('T');
            const storedDate = localStorage.getItem('dl_date');
            if (storedDate !== today) {
                localStorage.setItem('dl_date', today);
                localStorage.setItem('dl_count', '0');
                return { date: today, count: 0 };
            }
            return { date: today, count: parseInt(localStorage.getItem('dl_count') || '0', 10) };
        }

        function updateUI() {
            const token = getUrlToken();
            if (token) {
                document.getElementById('upgradeBtn').style.display = "none";
                document.getElementById('footerQuota').innerHTML = '<div style="color: #10b981; font-weight: 900;">SESSÃO PREMIUM CRIPTOGRAFADA ATIVA</div>';
                document.getElementById('mainTitle').innerHTML = 'PREMIUM <span>PANEL</span>';
                document.getElementById('mainDesc').innerText = 'Painel de controle de alta performance. Extração em lote liberada.';
                
                const textarea = document.getElementById('videoUrl');
                textarea.placeholder = "Cole múltiplos links do YouTube aqui (um por linha)...";
                textarea.rows = 5;
                
                const card = document.querySelector('.card');
                card.style.borderColor = "#10b981";
                card.style.boxShadow = "0 0 40px rgba(16, 185, 129, 0.15), inset 0 0 20px rgba(16, 185, 129, 0.05)";
                
                const glow = document.querySelector('.glow-effect');
                glow.style.background = "linear-gradient(135deg, #10b981, #064e3b)";
                
                document.getElementById('qualitySelectionContainer').style.display = "block";
                return;
            }

            const data = getStorageData();
            const restantes = Math.max(0, MAX_DOWNLOADS - data.count);
            document.getElementById('cotaContador').innerText = `${restantes}/${MAX_DOWNLOADS}`;
        }

        function incrementCount() {
            if (getUrlToken()) return;
            const data = getStorageData();
            localStorage.setItem('dl_count', (data.count + 1).toString());
            updateUI();
        }

        function openPremiumModal() {
            const modal = document.getElementById('premiumModal');
            modal.classList.add('active');
        }

        function closePremiumModal() {
            const modal = document.getElementById('premiumModal');
            modal.classList.remove('active');
        }

        document.getElementById('downloadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const statusAlert = document.getElementById('statusAlert');
            const container = document.getElementById('resultsContainer');
            const urlsText = document.getElementById('videoUrl').value.trim();
            
            const token = getUrlToken();
            let qualityProfile = "mp3_128k";
            if (token) {
                qualityProfile = document.querySelector('input[name="qualityProfile"]:checked').value;
            }

            statusAlert.className = "status-alert hidden";
            container.innerHTML = "";

            const urlList = urlsText.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            if (urlList.length === 0) return;

            if (!token) {
                const data = getStorageData();
                if (data.count >= MAX_DOWNLOADS) {
                    openPremiumModal();
                    return;
                }
                if (urlList.length > 1) {
                    openPremiumModal();
                    return;
                }
            }

            statusAlert.classList.remove('hidden');
            statusAlert.className = "status-alert status-blue";
            statusAlert.innerText = token ? "PROCESSANDO EXTRAÇÃO MULTILINKS SIMULTÂNEA..." : "ESTABELECENDO CONEXÃO PROTEGIDA COM O SERVIDOR...";

            const payloadItems = urlList.map(url => ({ url: url, quality_profile: qualityProfile }));
            const payloadBody = { items: payloadItems };
            if (token) payloadBody.token = token;

            try {
                const response = await fetch(`${API_BASE_URL}api/v1/download/processar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadBody)
                });

                if (response.status === 403 && !token) {
                    localStorage.setItem('dl_count', MAX_DOWNLOADS.toString());
                    updateUI();
                    openPremiumModal();
                    statusAlert.className = "status-alert hidden";
                    return;
                }

                if (!response.ok) throw new Error();
                const batchResult = await response.json();
                
                statusAlert.className = "status-alert status-green";
                statusAlert.innerText = "ARQUIVOS CONVERTIDOS COM SUCESSO!";

                batchResult.results.forEach(result => {
                    const itemCard = document.createElement('div');
                    const isGreenTheme = token ? "border: 2px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);" : "border: 2px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);";
                    const thumbBorder = token ? "border: 1px solid rgba(16,185,129,0.3);" : "border: 1px solid rgba(220,38,38,0.3);";
                    
                    if (result.status === "success") {
                        itemCard.style = `text-align: left; background: #050508; padding: 20px; border-radius: 16px; margin-bottom: 20px; ${isGreenTheme}`;
                        itemCard.innerHTML = `
                            <img src="${result.thumbnail}" alt="Thumb" style="width: 100%; ${thumbBorder}" />
                            <h3 style="font-size: 13px; margin: 12px 0; color: #f8fafc; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-family: sans-serif;">${result.title}</h3>
                            <a href="${result.download_url}" download="${result.title}.mp3" class="btn btn-green" style="text-decoration: none; display: block; text-align: center;">BAIXAR ARQUIVO AGORA</a>
                        `;
                        container.appendChild(itemCard);
                        incrementCount();
                    } else {
                        itemCard.className = "status-alert status-red";
                        itemCard.innerText = `FALHA NO LINK: ${result.url}`;
                        container.appendChild(itemCard);
                    }
                });
            } catch (error) {
                statusAlert.className = "status-alert status-red";
                statusAlert.innerText = "FALHA NO PROCESSAMENTO. VERIFIQUE SE O LINK É PÚBLICO.";
            } finally {
                document.getElementById('videoUrl').value = "";
            }
        });

        document.getElementById('buyPremiumBtn').addEventListener('click', async function() {
            try {
                const response = await fetch(`${API_BASE_URL}api/v1/payments/checkout/create-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();
                if (result.checkout_url) window.location.href = result.checkout_url;
            } catch (err) {
                alert('Erro ao chamar o gateway de pagamento.');
            }
        });

        window.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
