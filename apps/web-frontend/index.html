<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - Premium</title>
    <!-- Tailwind CSS v4 via CDN para renderização limpa, ultra rápida e responsiva -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen font-sans antialiased selection:bg-red-500/30 selection:text-red-200">

    <main class="max-w-md w-full mx-4 p-8 bg-slate-900 rounded-2xl shadow-2xl border border-slate-800/80 text-center relative overflow-hidden">
        <!-- Detalhe sutil de iluminação no topo do card -->
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-40 h-40 bg-red-500/10 rounded-full blur-2xl pointer-events-none"></div>

        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 mb-2 tracking-tight">
            YT Downloader
        </h1>
        <p class="text-slate-400 mb-8 text-sm font-medium">Download de vídeos em alta velocidade e segurança máxima.</p>

        <!-- Formulário principal (Sanitizado) -->
        <form id="downloadForm" class="space-y-4" onsubmit="event.preventDefault();">
            <div class="relative">
                <input 
                    type="url" 
                    id="videoUrl"
                    placeholder="Cole o link do YouTube aqui..." 
                    required
                    class="w-full px-4 py-3.5 bg-slate-950 rounded-xl border border-slate-800 focus:border-red-500/50 focus:ring-2 focus:ring-red-500/10 text-slate-200 placeholder-slate-500 text-sm outline-none transition-all duration-200"
                />
            </div>
            
            <button 
                type="submit"
                class="w-full py-3.5 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 font-semibold rounded-xl shadow-lg shadow-red-950/20 active:scale-[0.98] transition-all duration-150 cursor-pointer"
            >
                Processar Vídeo
            </button>
        </form>

        <!-- Status / Área informativa -->
        <div class="mt-6 pt-6 border-t border-slate-800/60 flex items-center justify-between text-xs text-slate-500">
            <div class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>API Conectada</span>
            </div>
            <div>
                <span>Plano Premium: <strong class="text-amber-500 font-semibold">R$ 4,99/mês</strong></span>
            </div>
        </div>
    </main>

</body>
</html>
