<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Formatos YouTube</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #ef4444; }
        input {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 1px solid #374151;
            color: #fff;
            font-family: monospace;
            margin: 10px 0;
        }
        button {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0;
        }
        button:hover { background: #dc2626; }
        #result {
            margin-top: 20px;
            background: #050508;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1f2937;
        }
        .format-item {
            background: #1f2937;
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            border-left: 3px solid #10b981;
        }
        .format-item.mp4 { border-left-color: #3b82f6; }
        .format-item.mp3 { border-left-color: #f59e0b; }
        .format-item.webm { border-left-color: #8b5cf6; }
        .label { color: #94a3b8; font-size: 12px; }
        .value { color: #f8fafc; font-size: 14px; font-weight: bold; }
        .highlight { color: #10b981; background: #064e3b; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🔍 Debug - Formatos do YouTube</h1>
    <p style="color: #94a3b8;">Veja quais formatos estão disponíveis para cada vídeo</p>

    <input type="text" id="urlInput" placeholder="Cole a URL do YouTube aqui..." value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
    <button onclick="buscarFormatos()">🔎 Buscar Formatos</button>

    <div id="result"></div>

    <script>
        const API_BASE = "https://backend-production-5a6c0.up.railway.app";

        async function buscarFormatos() {
            const url = document.getElementById('urlInput').value.trim();
            const resultDiv = document.getElementById('result');

            if (!url) {
                alert('Cole uma URL primeiro');
                return;
            }

            resultDiv.innerHTML = '<p style="color: #ef4444;">⏳ Buscando...</p>';

            try {
                const response = await fetch(`${API_BASE}/api/v1/download/debug/formats?url=${encodeURIComponent(url)}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.erro) {
                    resultDiv.innerHTML = `<p style="color: #ef4444;">❌ Erro: ${data.erro}</p>`;
                    return;
                }

                let html = `
                    <h2 style="color: #10b981;">✅ ${data.title || 'Sem título'}</h2>
                    <p class="label">Total de formatos: <span class="value">${data.total_formats}</span></p>
                    <p class="label">Formatos selecionados pelo yt-dlp: <span class="highlight">${JSON.stringify(data.requested_formats)}</span></p>
                    <hr style="border-color: #1f2937; margin: 20px 0;">
                    <h3 style="color: #f8fafc;">Top 10 Melhores Formatos:</h3>
                `;

                data.top_10.forEach((fmt, index) => {
                    const ext = fmt.ext || 'unknown';
                    const isVideo = fmt.vcodec && fmt.vcodec !== 'none';
                    const isAudio = fmt.acodec && fmt.acodec !== 'none';
                    const typeClass = ext === 'mp4' ? 'mp4' : ext === 'mp3' ? 'mp3' : 'webm';

                    const sizeMB = fmt.filesize ? (fmt.filesize / 1024 / 1024).toFixed(2) + ' MB' : 'N/A';
                    const resolution = fmt.resolution || (fmt.height ? `${fmt.height}p` : ' audio');

                    html += `
                        <div class="format-item ${typeClass}">
                            <div class="label">FORMATO ${index + 1}</div>
                            <div class="value">${ext.toUpperCase()} - ${resolution}</div>
                            <div class="label">Codecs: ${fmt.vcodec || 'N/A'} / ${fmt.acodec || 'N/A'}</div>
                            <div class="label">Tamanho: ${sizeMB}</div>
                            <div class="label">Dimensões: ${fmt.width || '?'}x${fmt.height || '?'}</div>
                            <div class="label">ID: ${fmt.format_id}</div>
                        </div>
                    `;
                });

                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: #ef4444;">❌ Erro ao buscar: ${error.message}</p>`;
            }
        }

        // Buscar automaticamente se há URL no input
        window.addEventListener('load', () => {
            if (document.getElementById('urlInput').value) {
                buscarFormatos();
            }
        });
    </script>
</body>
</html>
