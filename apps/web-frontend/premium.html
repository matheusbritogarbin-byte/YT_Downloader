<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div class="wrapper" style="padding-top: 40px;">
        <main>
            <div class="card" style="max-width: 500px; border-color: #10b981; box-shadow: 0 0 40px rgba(16, 185, 129, 0.15), inset 0 0 20px rgba(16, 185, 129, 0.05);">
                <div class="glow-effect" style="background: linear-gradient(135deg, #10b981, #064e3b);"></div>
                <h1>YT Downloader <span>Premium</span></h1>
                <p>Painel de controle de alta performance. Extração em lote liberada.</p>

                <form id="downloadForm" class="input-group">
                    <textarea 
                        id="videoUrls"
                        placeholder="Cole múltiplos links do YouTube aqui (um por linha)..." 
                        required
                        rows="5"
                        style="width: 100%; padding: 18px 20px; background-color: #050508; border: 2px solid #10b981; border-radius: 16px; color: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: 600; outline: none; resize: none; box-sizing: border-box;"
                    ></textarea>
                    
                    <div style="background-color: #050508; border: 2px solid #1f2937; border-radius: 16px; padding: 16px; text-align: left; font-family: sans-serif; font-size: 13px;">
                        <span style="color: #10b981; font-weight: 900; display: block; margin-bottom: 12px; font-size: 11px; letter-spacing: 1px;">SELECIONE O PERFIL DE QUALIDADE</span>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_1080p" checked style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - FULL HD 1080p</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_720p" style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - HD 720p</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp3_320k" style="margin-right: 8px; accent-color: #10b981;"> MP3 Áudio - ULTRA HQ 320kbps</label>
                        </div>
                    </div>
                    
                    <button type="submit">
                        DOWNLOAD
                    </button>
                </form>

                <div id="statusAlert" class="status-alert hidden"></div>
                <div id="resultsContainer" style="margin-top: 28px; display: flex; flex-direction: column; gap: 20px;"></div>

                <div class="footer-info" style="justify-content: center; color: #10b981; border-top-color: #1f2937;">
                    <strong>SESSÃO PREMIUM CRIPTOGRAFADA ATIVA</strong>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 YT Downloader Premium.</p>
    </footer>

    <script>
        const API_BASE_URL = "https://backend-production-5a6c0.up.railway.app";

        // --- Detecta se está dentro do PyWebView Desktop -------------------
        const IS_DESKTOP = typeof window.pywebview !== 'undefined'
            && window.pywebview !== null
            && typeof window.pywebview.api !== 'undefined'
            && window.pywebview.api !== null;

        // --- Referências DOM -------------------------------------------------
        const statusAlert = document.getElementById('statusAlert');
        const container = document.getElementById('resultsContainer');
        const formEl = document.getElementById('downloadForm');
        const footerInfo = document.querySelector('.footer-info');

        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) { e.preventDefault(); return false; }
        });

        function getUrlToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('premium_token', urlToken);
                return urlToken;
            }
            return localStorage.getItem('premium_token');
        }

        // ------------------------------------------------------------------
        // Phone Home — verificação de licença (apenas no Desktop)
        // ------------------------------------------------------------------
        async function realizarPhoneHome(token) {
            if (!IS_DESKTOP || !token) return true;

            try {
                const raw = await window.pywebview.api.verificar_token(token);
                const result = JSON.parse(raw);
                return result && result.valido === true;
            } catch (err) {
                return false;
            }
        }

        function bloquearAcessoExpirado() {
            // Oculta completamente a área de download
            if (formEl) formEl.style.display = 'none';
            if (footerInfo) footerInfo.style.display = 'none';

            // Remove qualquer conteúdo anterior e mostra alerta crítico
            container.innerHTML = '';
            statusAlert.className = 'status-alert hidden';

            const blockCard = document.createElement('div');
            blockCard.style.cssText = `
                text-align: center; background: #1a0a0a; padding: 30px 20px;
                border-radius: 16px; border: 2px solid #ef4444;
                box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
                margin-bottom: 20px;
            `;
            blockCard.innerHTML = `
                <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);">
                    <svg fill="none" stroke="#ffffff" viewBox="0 0 24 24" style="width: 26px; height: 26px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                </div>
                <h2 style="color: #ef4444; font-size: 18px; font-weight: 900; margin: 0 0 12px 0;">
                    ASSINATURA EXPIRADA
                </h2>
                <p style="color: #fca5a5; font-size: 13px; line-height: 1.6; margin: 0;">
                    SUA ASSINATURA EXPIROU. RENOVE NO SITE PARA CONTINUAR UTILIZANDO O APLICATIVO PREMIUM.
                </p>
            `;
            container.appendChild(blockCard);

            // Força scroll para o topo para o utilizador ver o alerta
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ------------------------------------------------------------------
        // Inicialização — verificação de token e Phone Home
        // ------------------------------------------------------------------
        window.addEventListener('DOMContentLoaded', async function() {
            const token = getUrlToken();
            const count = localStorage.getItem('dl_count');

            // Se não há token e não é desktop ilimitado, redireciona
            if (!token && count !== '-999999') {
                window.location.href = "index.html";
                return;
            }

            // Phone Home: validar licença no Railway (apenas Desktop)
            if (IS_DESKTOP && token) {
                statusAlert.className = "status-alert status-blue";
                statusAlert.innerText = "VALIDANDO LICENÇA DE SEGURANÇA...";
                statusAlert.classList.remove('hidden');

                const licencaValida = await realizarPhoneHome(token);

                if (!licencaValida) {
                    bloquearAcessoExpirado();
                    return;
                }

                // Licença válida — esconde o status de loading
                statusAlert.className = "status-alert hidden";
            }

            // Se chegou aqui, licença OK ou modo web
            if (IS_DESKTOP) {
                if (footerInfo) footerInfo.innerHTML = '<strong>MODO PREMIUM DESKTOP — LICENÇA VERIFICADA</strong>';
            }
        });

        // ------------------------------------------------------------------
        // Handler principal do formulário de download
        // ------------------------------------------------------------------
        document.getElementById('downloadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const urlsText = document.getElementById('videoUrls').value.trim();
            const qualityProfile = document.querySelector('input[name="qualityProfile"]:checked').value;

            statusAlert.className = "status-alert hidden";
            container.innerHTML = "";

            const urlList = urlsText.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            if (urlList.length === 0) return;

            statusAlert.classList.remove('hidden');
            statusAlert.className = "status-alert status-blue";

            // Mapear perfil de qualidade para extensão
            let ext = "mp3";
            if (qualityProfile === "mp4_1080p" || qualityProfile === "mp4_720p") {
                ext = "mp4";
            }

            // ==============================================================
            // MODO PYTHON DESKTOP  (PyWebView Bridge)
            // ==============================================================
            if (IS_DESKTOP) {
                statusAlert.innerText = "PROCESSANDO VIA MECANISMO NATIVO DO SEU SISTEMA...";
                try {
                    const rawResult = await window.pywebview.api.processar(
                        JSON.stringify(urlList),
                        qualityProfile
                    );
                    const parsed = JSON.parse(rawResult);
                    const results = parsed.results || [];

                    if (results.length === 0) throw new Error("Nenhum resultado obtido.");

                    statusAlert.className = "status-alert status-green";
                    statusAlert.innerText = "ARQUIVOS BAIXADOS COM SUCESSO!";

                    // Processar cada resultado sequencialmente
                    for (const result of results) {
                        const itemCard = document.createElement('div');

                        if (result.status === "success") {
                            // Descarregar ficheiro para Downloads
                            const downloadResult = await window.pywebview.api.baixar_ficheiro(
                                result.download_url,
                                result.title,
                                ext,
                                ""
                            );
                            const saveInfo = JSON.parse(downloadResult);

                            itemCard.style.cssText = "text-align: left; background: #050508; padding: 20px; border-radius: 16px; border: 2px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); margin-bottom: 20px;";

                            if (saveInfo.sucesso) {
                                itemCard.innerHTML = `
                                    <img src="${result.thumbnail || ''}" alt="Thumb" style="width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(16,185,129,0.3);" />
                                    <h3 style="font-size: 13px; margin: 12px 0; color: #f8fafc; font-weight: 700;">${result.title}</h3>
                                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                                        <button onclick="window.pywebview.api.abrir_pasta('${saveInfo.caminho.replace(/\\/g, '\\\\')}')"
                                            class="btn btn-green"
                                            style="flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; background: #10b981; color: #fff;">
                                            📂 ABRIR PASTA
                                        </button>
                                    </div>
                                    <p style="color: #64748b; font-size: 11px; margin-top: 10px; word-break: break-all;">
                                        Salvo em:<br><strong>${saveInfo.caminho}</strong>
                                    </p>
                                `;
                            } else {
                                itemCard.innerHTML = `
                                    <img src="${result.thumbnail || ''}" alt="Thumb" style="width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(239,68,68,0.3);" />
                                    <h3 style="font-size: 13px; margin: 12px 0; color: #f8fafc; font-weight: 700;">${result.title}</h3>
                                    <div class="status-alert status-red" style="margin: 0;">
                                        ERRO AO SALVAR: ${saveInfo.erro || "Desconhecido"}
                                    </div>
                                `;
                            }
                        } else {
                            itemCard.className = "status-alert status-red";
                            itemCard.style.cssText = "margin-bottom: 10px;";
                            itemCard.innerText = `FALHA NO LINK: ${result.url}`;
                        }
                        container.appendChild(itemCard);
                    }
                } catch (error) {
                    statusAlert.className = "status-alert status-red";
                    statusAlert.innerText = "FALHA NO PROCESSAMENTO NATIVO: " + (error.message || "Erro desconhecido.");
                } finally {
                    document.getElementById('videoUrls').value = "";
                }
                return;
            }

            // ==============================================================
            // MODO NAVEGADOR  (fetch para Railway)
            // ==============================================================
            statusAlert.innerText = "PROCESSANDO EXTRAÇÃO MULTILINKS SIMULTÂNEA...";

            const token = getUrlToken();
            const payloadItems = urlList.map(url => ({ url: url, quality_profile: qualityProfile }));
            const payloadBody = { items: payloadItems };
            if (token) payloadBody.token = token;

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/download/processar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadBody)
                });

                if (!response.ok) throw new Error();
                const batchResult = await response.json();

                statusAlert.className = "status-alert status-green";
                statusAlert.innerText = "ARQUIVOS CONVERTIDOS COM SUCESSO!";

                batchResult.results.forEach(result => {
                    const itemCard = document.createElement('div');
                    if (result.status === "success") {
                        itemCard.style.cssText = "text-align: left; background: #050508; padding: 20px; border-radius: 16px; border: 2px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); margin-bottom: 20px;";

                        const extensao = result.download_url.includes("ext=mp4") ? "MP4 VÍDEO" : "MP3 ÁUDIO";

                        itemCard.innerHTML = `
                            <img src="${result.thumbnail}" alt="Thumb" style="width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(16,185,129,0.3);" />
                            <h3 style="font-size: 13px; margin: 12px 0; color: #f8fafc; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${result.title}</h3>
                            <a href="${result.download_url}" target="_self" class="btn btn-green" style="text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 10px; font-weight: 700; background: #10b981; color: #fff;">BAIXAR ${extensao} NOW</a>
                        `;
                        container.appendChild(itemCard);
                    } else {
                        itemCard.className = "status-alert status-red";
                        itemCard.innerText = `FALHA NO LINK: ${result.url}`;
                        container.appendChild(itemCard);
                    }
                });
            } catch (error) {
                statusAlert.className = "status-alert status-red";
                statusAlert.innerText = "ERRO INTERNO NO PROCESSAMENTO EM LOTE.";
            } finally {
                document.getElementById('videoUrls').value = "";
            }
        });
    </script>
</body>
</html>
