<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

    <div class="wrapper" style="padding-top: 40px;">
        <main>
            <div class="card" style="max-width: 500px; border-color: #10b981; box-shadow: 0 0 40px rgba(16, 185, 129, 0.15), inset 0 0 20px rgba(16, 185, 129, 0.05);">
                <div class="glow-effect" style="background: linear-gradient(135deg, #10b981, #064e3b);"></div>
                <h1>YT <span>Downloader</span> Premium</h1>
                <p>Downloads ilimitados em lote. Sem cotas.</p>

                <form id="downloadForm" class="input-group">
                    <textarea 
                        id="videoUrls"
                        placeholder="Cole múltiplos links do YouTube aqui (um por linha)..." 
                        required
                        rows="5"
                        style="width: 100%; padding: 18px 20px; background-color: #050508; border: 2px solid #10b981; border-radius: 16px; color: #ffffff; font-family: sans-serif; font-size: 14px; font-weight: 600; outline: none; resize: none; box-sizing: border-box;"
                    ></textarea>

                    <div style="background-color: #050508; border: 2px solid #1f2937; border-radius: 16px; padding: 16px; text-align: left; font-family: sans-serif; font-size: 13px;">
                        <span style="color: #10b981; font-weight: 900; display: block; margin-bottom: 12px; font-size: 11px; letter-spacing: 1px;">SELECIONE O FORMATO E QUALIDADE</span>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_1080p" checked style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - 1080p HD</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_720p" style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - 720p HD</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp4_480p" style="margin-right: 8px; accent-color: #10b981;"> MP4 Vídeo - 480p</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp3_320k" style="margin-right: 8px; accent-color: #10b981;"> MP3 Áudio - 320kbps (Alta)</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp3_192k" style="margin-right: 8px; accent-color: #10b981;"> MP3 Áudio - 192kbps (Média)</label>
                            <label style="color: #f8fafc; cursor: pointer;"><input type="radio" name="qualityProfile" value="mp3_128k" style="margin-right: 8px; accent-color: #10b981;"> MP3 Áudio - 128kbps (Económica)</label>
                        </div>
                    </div>

                    <button type="submit">
                        DOWNLOAD
                    </button>
                </form>

                <div id="statusAlert" class="status-alert hidden"></div>
                <div id="loadingSpinner" class="hidden" style="margin: 20px 0; text-align: center;">
                    <div class="spinner" style="border: 4px solid rgba(16, 185, 129, 0.2); border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 12px;"></div>
                    <p style="color: #94a3b8; font-size: 13px;">Processando vídeos...</p>
                </div>
                <div id="batchActions" style="margin-top: 16px; display: none;">
                    <button id="downloadAllBtn" class="btn btn-green" style="width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; background: #10b981; color: #fff; cursor: pointer; font-size: 15px;">
                        ⬇ BAIXAR TODOS OS ARQUIVOS
                    </button>
                    <p id="batchCount" style="margin-top: 10px; color: #94a3b8; font-size: 12px;"></p>
                </div>
                <div id="resultsContainer" style="margin-top: 28px; display: flex; flex-direction: column; gap: 20px;"></div>

                <div class="footer-info" style="justify-content: center; color: #10b981; border-top-color: #1f2937;">
                    <strong>SESSÃO PREMIUM CRIPTOGRAFADA ATIVA</strong>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 YT Downloader Premium.</p>
    </footer>

    <script>
        const API_BASE_URL = "https://backend-production-5a6c0.up.railway.app/";

        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) { e.preventDefault(); return false; }
        });

        function getUrlToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('premium_token', urlToken);
                return urlToken;
            }
            return localStorage.getItem('premium_token');
        }

        function getStorageData() {
            const today = new Date().toISOString().split('T')[0];
            const storedDate = localStorage.getItem('dl_date');
            if (storedDate !== today) {
                localStorage.setItem('dl_date', today);
                localStorage.setItem('dl_count', '0');
                return { date: today, count: 0 };
            }
            return { date: today, count: parseInt(localStorage.getItem('dl_count') || '0', 10) };
        }

        function updateUI() {
            const token = getUrlToken();
            const data = getStorageData();
            const restantes = Math.max(0, 999 - data.count);
            const counter = document.getElementById('cotaContador');
            if (counter) counter.innerText = `${restantes}/999`;
        }

        function incrementCount() {
            const data = getStorageData();
            localStorage.setItem('dl_count', (data.count + 1).toString());
            updateUI();
        }

        function obterPerfil() {
            const radio = document.querySelector('input[name="qualityProfile"]:checked');
            return radio ? radio.value : "mp4_1080p";
        }

        async function processarDownloadNativoNoCliente(urlVideo, tipoMidia, tituloVideo, qualityProfile) {
            const statusAlert = document.getElementById('statusAlert');
            statusAlert.className = "status-alert status-blue";
            statusAlert.innerText = "INICIANDO DOWNLOAD...";

            try {
                const ext = tipoMidia === "mp4" ? "mp4" : "mp3";
                const nomeArquivo = tituloVideo || "video";
                const perfil = qualityProfile || obterPerfil();
                const downloadUrl = `${API_BASE_URL}api/v1/download/stream?url=${encodeURIComponent(urlVideo)}&title=${encodeURIComponent(nomeArquivo)}&ext=${ext}&quality_profile=${perfil}`;

                const linkDownload = downloadUrl.startsWith("http://") ? downloadUrl.replace("http://", "https://", 1) : downloadUrl;
                const trigger = document.createElement('a');
                trigger.href = linkDownload;
                trigger.target = "_self";
                document.body.appendChild(trigger);
                trigger.click();
                document.body.removeChild(trigger);

                statusAlert.className = "status-alert status-green";
                statusAlert.innerText = "DOWNLOAD INICIADO!";
                incrementCount();
            } catch (err) {
                statusAlert.className = "status-alert status-red";
                statusAlert.innerText = "FALHA NO DOWNLOAD. TENTE NOVAMENTE.";
            }
        }

        function processarDownloadsEmLote(urls, tipoMidia, titulos, qualityProfile) {
            let atraso = 0;
            urls.forEach((url, index) => {
                setTimeout(() => {
                    const titulo = titulos && titulos[index] ? titulos[index] : "video";
                    const perfil = qualityProfile || obterPerfil();
                    processarDownloadNativoNoCliente(url, tipoMidia, titulo, perfil);
                }, atraso);
                atraso += 800;
            });
        }

        document.getElementById('downloadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const statusAlert = document.getElementById('statusAlert');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const container = document.getElementById('resultsContainer');
            const urlsText = document.getElementById('videoUrls').value.trim();
            const qualityProfile = obterPerfil();

            // Mostrar loading
            loadingSpinner.classList.remove('hidden');
            statusAlert.classList.remove('hidden');
            statusAlert.className = "status-alert status-blue";
            statusAlert.innerText = "PROCESSANDO EXTRAÇÃO MULTILINKS SIMULTÂNEA...";

            const urlList = urlsText.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            if (urlList.length === 0) {
                loadingSpinner.classList.add('hidden');
                return;
            }

            const urlSanitizada = urlList.map(urlOriginal => {
                let urlFormatada = urlOriginal;
                if (urlOriginal.includes('v=')) {
                    const urlParams = new URLSearchParams(urlOriginal.split('?')[1]);
                    const vId = urlParams.get('v');
                    if (vId && vId.length === 11) urlFormatada = `https://youtube.com/watch?v=${vId}`;
                } else if (urlOriginal.includes('youtu.be/')) {
                    const parts = urlOriginal.split('youtu.be/');
                    const idExtract = parts[1] ? parts[1].split('?')[0] : '';
                    if (idExtract.length === 11) urlFormatada = `https://youtube.com/watch?v=${idExtract}`;
                } else if (urlOriginal.includes('/shorts/')) {
                    const parts = urlOriginal.split('/shorts/');
                    const idExtract = parts[1] ? parts[1].split('?')[0] : '';
                    if (idExtract.length === 11) urlFormatada = `https://youtube.com/watch?v=${idExtract}`;
                }
                return urlFormatada;
            });

            const token = getUrlToken();
            const payloadItems = urlSanitizada.map(url => ({ url: url, quality_profile: qualityProfile }));
            const payloadBody = { items: payloadItems };
            if (token) payloadBody.token = token;

            try {
                const response = await fetch(`${API_BASE_URL}api/v1/download/processar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payloadBody)
                });

                if (!response.ok) throw new Error();
                const batchResult = await response.json();

                statusAlert.classList.add('hidden');
                loadingSpinner.classList.add('hidden');

                const urlsParaDownload = [];
                const titulosParaDownload = [];

                batchResult.results.forEach(result => {
                    const itemCard = document.createElement('div');
                    if (result.status === "success") {
                        itemCard.style.cssText = "text-align: left; background: #050508; padding: 20px; border-radius: 16px; border: 2px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); margin-bottom: 20px;";

                        const extensaoLabel = qualityProfile.startsWith("mp4") ? "MP4 VÍDEO" : "MP3 ÁUDIO";
                        const fileExt = qualityProfile.startsWith("mp4") ? "mp4" : "mp3";

                        urlsParaDownload.push(result.download_url || result.url);
                        titulosParaDownload.push(result.title);

                        const perfilAtual = qualityProfile;
                        itemCard.innerHTML = `
                            <img src="${result.thumbnail}" alt="Thumb" style="width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(16,185,129,0.3);" />
                            <h3 style="font-size: 13px; margin: 12px 0; color: #f8fafc; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${result.title}</h3>
                            <button onclick="processarDownloadNativoNoCliente('${encodeURIComponent(result.download_url || result.url)}', '${fileExt}', '${encodeURIComponent(result.title).replace(/'/g, "%27")}', '${perfilAtual}')" class="btn btn-green" style="width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; background: #10b981; color: #fff; cursor: pointer;">BAIXAR ${extensaoLabel} AGORA</button>
                        `;
                        container.appendChild(itemCard);
                    } else {
                        itemCard.className = "status-alert status-red";
                        itemCard.innerText = `FALHA NO LINK: ${result.url}`;
                        container.appendChild(itemCard);
                    }
                });

                const batchActions = document.getElementById('batchActions');
                const downloadAllBtn = document.getElementById('downloadAllBtn');
                const batchCount = document.getElementById('batchCount');
                if (urlsParaDownload.length > 1) {
                    batchActions.style.display = 'block';
                    batchCount.innerText = `${urlsParaDownload.length} arquivos prontos para download.`;
                    const perfilAtual = qualityProfile;
                    downloadAllBtn.onclick = function() {
                        const fileExt = perfilAtual.startsWith("mp4") ? "mp4" : "mp3";
                        processarDownloadsEmLote(urlsParaDownload, fileExt, titulosParaDownload, perfilAtual);
                    };
                } else {
                    batchActions.style.display = 'none';
                }
            } catch (error) {
                loadingSpinner.classList.add('hidden');
                statusAlert.className = "status-alert status-red";
                statusAlert.innerText = "ERRO INTERNO NO PROCESSAMENTO EM LOTE.";
            } finally {
                document.getElementById('videoUrls').value = "";
            }
        });

        window.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
