<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado - YT Downloader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="success.css">
</head>
<body oncontextmenu="return false;">

    <div class="wrapper" style="padding-top: 40px;">
        <main>
            <div class="card" style="max-width: 480px; border-color: #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.15), inset 0 0 15px rgba(16, 185, 129, 0.05);">
                <div class="glow-effect glow-premium"></div>
                <div class="success-icon">✓</div>
                <h1 class="success-title">ACESSO ATIVADO</h1>
                <p class="success-text">OBRIGADO PELA SUA COMPRA!</p>

                <div class="info-box">
                    <span class="info-label">SEGURANÇA VITALÍCIA ATIVA</span>
                    O seu painel premium está liberado de forma ilimitada.
                    <br><br>
                    <strong>Atenção:</strong> Se limpar o cache, o acesso sumirá. Use o link do e-mail do Stripe para reativar.
                </div>

                <button id="accessPanelBtn" class="btn btn-green">
                    ACESSAR PAINEL PREMIUM
                </button>
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 YT Downloader.</p>
    </footer>

    <script>
        document.addEventListener("keydown", function(e) {
            if (e.key === "F12") { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === "u" || e.key === "U")) { e.preventDefault(); return false; }
        });

        const API_BASE_URL = "https://backend-production-5a6c0.up.railway.app/";
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');

        // Salvar token automaticamente ao chegar nesta página
        // O Stripe redireciona para cá após pagamento bem sucedido
        const emailParam = params.get('email');
        const token = emailParam || sessionId || 'stripe-paid';
        if (token) {
            localStorage.setItem('premium_token', token);
            localStorage.setItem('dl_count', '-999999');
            const btn = document.getElementById('accessPanelBtn');
            btn.onclick = () => window.location.href = `premium.html?token=${encodeURIComponent(token)}`;
        }

        document.getElementById('accessPanelBtn').addEventListener('click', function() {
            const token = localStorage.getItem('premium_token');
            if (token) {
                window.location.href = `premium.html?token=${token}`;
            } else {
                window.location.href = 'premium.html';
            }
        });
    </script>
</body>
</html>
